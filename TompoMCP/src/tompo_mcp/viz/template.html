<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOMPo — Lineage Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #fafafa; color: #333; }
  #header { background: linear-gradient(135deg, #0078d4 0%, #005a9e 100%); color: #fff; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
  #header h1 { font-size: 18px; font-weight: 600; letter-spacing: .3px; }
  #header .subtitle { font-size: 13px; opacity: .85; }
  #banner { background: linear-gradient(90deg, #f0960a, #e8780a); color: #fff; text-align: center; padding: 6px; font-size: 12px; font-weight: 600; letter-spacing: .5px; }
  #toolbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; flex-wrap: wrap; }
  #toolbar button { background: #f3f3f3; border: 1px solid #d0d0d0; border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: 13px; }
  #toolbar button:hover { background: #e0e0e0; }
  #toolbar select { padding: 4px 8px; border: 1px solid #d0d0d0; border-radius: 4px; font-size: 13px; background: #fff; }
  #legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 12px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  #tabs { display: flex; border-bottom: 2px solid #e0e0e0; background: #fff; }
  .tab { padding: 10px 20px; cursor: pointer; font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .tab:hover { background: #f5f5f5; }
  .tab.active { border-bottom-color: #0078d4; color: #0078d4; }
  #tree-panel { flex: 1; overflow: hidden; cursor: grab; background: #fafafa; }
  #tree-panel:active { cursor: grabbing; }
  #tree-panel svg { display: block; }
  .node circle { transition: fill .2s; }
  .node:hover circle { filter: brightness(1.15); }
  .node text { pointer-events: none; }
  .link { fill: none; stroke: #c0c0c0; stroke-width: 1.5; stroke-opacity: .5; }
  #impact-panel, #model-panel, #rel-panel { display: none; padding: 16px; overflow: auto; max-height: calc(100vh - 160px); }
  table.data-grid { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data-grid th { background: #f3f3f3; text-align: left; padding: 8px 10px; border-bottom: 2px solid #d0d0d0; position: sticky; top: 0; }
  table.data-grid td { padding: 6px 10px; border-bottom: 1px solid #eee; }
  table.data-grid tr:hover td { background: #f0f7ff; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-col { background: #e8daef; color: #6c3483; }
  .badge-meas { background: #fadbd8; color: #922b21; }
  .badge-model { background: #d4e6f1; color: #1b4f72; }
  .badge-orphan { background: #fff3e0; color: #e65100; }
  .search-box { padding: 6px 12px; border: 1px solid #d0d0d0; border-radius: 4px; font-size: 13px; width: 280px; }
  .stats { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .stat-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px 16px; text-align: center; min-width: 100px; }
  .stat-val { font-size: 22px; font-weight: 700; color: #0078d4; }
  .stat-label { font-size: 11px; color: #666; }
  #main { display: flex; flex-direction: column; height: calc(100vh - 0px); }
  .fullscreen #header, .fullscreen #banner { display: none; }
  .fullscreen #main { height: 100vh; }
  .filter-bar { display: flex; gap: 10px; align-items: center; padding: 8px 16px; background: #f8f8f8; border-bottom: 1px solid #e8e8e8; flex-wrap: wrap; }
  .filter-bar label { font-size: 12px; font-weight: 600; color: #555; }
  .filter-bar select { padding: 4px 8px; border: 1px solid #d0d0d0; border-radius: 4px; font-size: 12px; min-width: 120px; }
  .filter-bar input { padding: 4px 8px; border: 1px solid #d0d0d0; border-radius: 4px; font-size: 12px; width: 160px; }
  .model-chip { display: inline-block; background: #e8f4fd; border: 1px solid #0078d4; color: #0078d4; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; margin: 2px; }
  .model-chip.orphaned { background: #fff3e0; border-color: #e65100; color: #e65100; }
  .highlight circle { filter: drop-shadow(0 0 6px #ffab00) drop-shadow(0 0 12px #ffab00) !important; }
  .highlight text.label { fill: #e65100 !important; font-weight: 700 !important; }
  .dim { opacity: 0.2 !important; }
  /* Relationship graph */
  #rel-svg { width: 100%; height: calc(100vh - 240px); min-height: 400px; border: 1px solid #e0e0e0; border-radius: 6px; background: #fff; }
  .rel-link { stroke: #999; stroke-opacity: 0.6; marker-end: url(#arrowhead); }
  .rel-link.inactive { stroke-dasharray: 5 3; stroke: #ccc; }
  .rel-node { cursor: pointer; }
  .rel-node text { font-size: 11px; font-weight: 600; pointer-events: none; }
  .rel-label { font-size: 9px; fill: #666; }
  /* Orphan detection */
  .orphan-section { margin-top: 16px; padding: 12px; background: #fff8e1; border: 1px solid #ffe082; border-radius: 6px; }
  .orphan-section h3 { font-size: 14px; color: #e65100; margin-bottom: 8px; }
  /* What-If Simulator */
  #whatif-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #fff; border: 2px solid #d13438; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); padding: 20px; max-width: 700px; width: 90%; max-height: 80vh; overflow: auto; z-index: 9999; }
  #whatif-panel h2 { color: #d13438; margin-bottom: 12px; font-size: 16px; }
  #whatif-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9998; }
  .whatif-cascade { font-size: 13px; line-height: 1.8; }
  .whatif-cascade .broken { color: #d13438; font-weight: 600; }
  .whatif-cascade .dep-measure { color: #e3008c; }
  .whatif-cascade .dep-visual { color: #ff8c00; }
  .whatif-cascade .dep-report { color: #107c10; }
  .whatif-indent { margin-left: 20px; border-left: 2px solid #fdd; padding-left: 10px; }
  .btn-whatif { background: #d13438; color: #fff; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-whatif:hover { background: #a4262c; }
  .btn-export { background: #107c10; color: #fff; border: none; border-radius: 4px; padding: 5px 14px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-export:hover { background: #0b5e0b; }
  .stale-summary { background: #fff3e0; border: 1px solid #ffcc02; border-radius: 8px; padding: 14px 18px; margin-bottom: 12px; }
  .stale-summary .pct { font-size: 28px; font-weight: 700; color: #e65100; }
</style>
</head>
<body>
<div id="header">
  <div>
    <h1>TOMPo — Lineage Visualization</h1>
    <div class="subtitle" id="model-title"></div>
  </div>
  <div style="font-size:12px;opacity:.7">Generated by tompo-mcp</div>
</div>
<div id="banner">Model ➤ Table ➤ Report ➤ Page ➤ Visual ➤ Column / Measure</div>
<div id="whatif-overlay" onclick="closeWhatIf()"></div>
<div id="whatif-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <h2 id="whatif-title">What-If Deletion Simulator</h2>
    <button onclick="closeWhatIf()" style="background:none;border:none;font-size:20px;cursor:pointer">&times;</button>
  </div>
  <div id="whatif-body" class="whatif-cascade"></div>
</div>
<div id="main">
  <div id="tabs">
    <div class="tab active" data-tab="tree">Lineage Tree</div>
    <div class="tab" data-tab="impact">Impact Analysis</div>
    <div class="tab" data-tab="model">Semantic Models</div>
  </div>
  <div class="filter-bar" id="filter-bar">
    <label>Model:</label>
    <select id="modelSelector" onchange="onModelSelect(this.value)"></select>
    <label>Report:</label>
    <select id="reportSelector" onchange="onReportFilter(this.value)"></select>
    <label>Page:</label>
    <select id="pageSelector" onchange="onPageFilter(this.value)"></select>
    <label>Visual:</label>
    <select id="visualTypeSelector" onchange="onVisualTypeFilter(this.value)"></select>
    <label>Table:</label>
    <select id="tableSelector" onchange="onTableFilter(this.value)"></select>
    <span style="margin-left:8px"></span>
    <label>Search:</label>
    <input id="treeSearch" type="text" placeholder="Column or measure name..." oninput="onTreeSearch(this.value)">
  </div>
  <div id="toolbar">
    <div id="legend"></div>
    <div style="margin-left:auto;display:flex;gap:6px">
      <button onclick="expandAll()">Expand All</button>
      <button onclick="collapseAll()">Collapse All</button>
      <button onclick="resetView()">Reset</button>
      <button onclick="toggleFullscreen()">Fullscreen</button>
      <select id="fontSize" onchange="changeFontSize(this.value)" style="padding:4px">
        <option value="9">9px</option><option value="10">10px</option>
        <option value="11">11px</option><option value="12" selected>12px</option>
        <option value="14">14px</option><option value="16">16px</option>
      </select>
    </div>
  </div>
  <div id="tree-panel"></div>
  <div id="impact-panel"></div>
  <div id="rel-panel"></div>
  <div id="model-panel"></div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ── DATA ──────────────────────────────────────────────────────────
const ALL_DATA = __LINEAGE_DATA_PLACEHOLDER__;
const MODELS = Array.isArray(ALL_DATA) ? ALL_DATA : [ALL_DATA];

const NODE_COLORS = {
  workspace: "#323130", model: "#0078d4", table: "#00b7c3", report: "#d13438",
  page: "#107c10", visual: "#ff8c00", column: "#8764b8", measure: "#e3008c"
};
const NODE_LABELS = {
  workspace: "Workspace", model: "Model", table: "Table", report: "Report",
  page: "Page", visual: "Visual", column: "Column", measure: "Measure"
};
const SIZES = { workspace: 12, model: 10, table: 8, report: 8, page: 7, visual: 6, column: 5, measure: 5 };

let currentFontSize = 12;
let treeRoot;
let currentModelIndex = -1;
let currentReportFilter = "";
let currentPageFilter = "";
let currentVisualTypeFilter = "";
let currentTableFilter = "";
let currentSearchTerm = "";

// ── LEGEND ────────────────────────────────────────────────────────
const legendEl = document.getElementById("legend");
Object.entries(NODE_COLORS).forEach(([type, color]) => {
  if (type === "workspace" && MODELS.length <= 1) return;
  legendEl.innerHTML += `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${NODE_LABELS[type]}</div>`;
});

// ── TABS ──────────────────────────────────────────────────────────
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    const which = tab.dataset.tab;
    document.getElementById("tree-panel").style.display = which === "tree" ? "block" : "none";
    document.getElementById("impact-panel").style.display = which === "impact" ? "block" : "none";
    document.getElementById("rel-panel").style.display = which === "rel" ? "block" : "none";
    document.getElementById("model-panel").style.display = which === "model" ? "block" : "none";
    document.getElementById("toolbar").style.display = which === "tree" ? "flex" : "none";
    document.getElementById("filter-bar").style.display = (which === "tree") ? "flex" : "none";
    if (which === "rel") buildRelGraph();
  });
});

// ── TITLE ─────────────────────────────────────────────────────────
const totalTables = MODELS.reduce((s, m) => s + m.model.tables.length, 0);
const totalReports = MODELS.reduce((s, m) => s + m.reports.length, 0);
document.getElementById("model-title").textContent = `${MODELS.length} model(s) — ${totalTables} tables, ${totalReports} reports`;

// ── SELECTORS ─────────────────────────────────────────────────────
const modelSel = document.getElementById("modelSelector");
const reportSel = document.getElementById("reportSelector");
const pageSel = document.getElementById("pageSelector");
const visualTypeSel = document.getElementById("visualTypeSelector");
const tableSel = document.getElementById("tableSelector");

function populateModelSelector() {
  modelSel.innerHTML = "";
  if (MODELS.length > 1) modelSel.innerHTML += `<option value="-1">All Models (${MODELS.length})</option>`;
  MODELS.forEach((m, i) => {
    const rCount = m.reports.length;
    const status = rCount > 0 ? `${rCount} reports` : "orphaned";
    modelSel.innerHTML += `<option value="${i}">${esc(m.model.name)} (${status})</option>`;
  });
}

function populateReportSelector() {
  reportSel.innerHTML = `<option value="">All Reports</option>`;
  const models = currentModelIndex === -1 ? MODELS : [MODELS[currentModelIndex]];
  const seen = new Set();
  models.forEach(m => {
    m.reports.forEach(r => { if (!seen.has(r.id)) { seen.add(r.id); reportSel.innerHTML += `<option value="${esc(r.id)}">${esc(r.name)}</option>`; } });
  });
}

function populatePageSelector() {
  pageSel.innerHTML = `<option value="">All Pages</option>`;
  const models = currentModelIndex === -1 ? MODELS : [MODELS[currentModelIndex]];
  const seen = new Set();
  models.forEach(m => {
    m.reports.forEach(r => {
      if (currentReportFilter && r.id !== currentReportFilter) return;
      (r.pages||[]).forEach(pg => { const key = r.id+"/"+pg.name; if (!seen.has(key)) { seen.add(key); pageSel.innerHTML += `<option value="${esc(key)}">${esc(pg.display_name)}</option>`; } });
    });
  });
}

function populateVisualTypeSelector() {
  visualTypeSel.innerHTML = `<option value="">All Visuals</option>`;
  const models = currentModelIndex === -1 ? MODELS : [MODELS[currentModelIndex]];
  const types = new Set();
  models.forEach(m => {
    m.reports.forEach(r => { (r.pages||[]).forEach(pg => { (pg.visuals||[]).forEach(v => { types.add(v.visual_type); }); }); });
  });
  [...types].sort().forEach(t => { visualTypeSel.innerHTML += `<option value="${esc(t)}">${esc(t)}</option>`; });
}

function populateTableSelector() {
  tableSel.innerHTML = `<option value="">All Tables</option>`;
  const models = currentModelIndex === -1 ? MODELS : [MODELS[currentModelIndex]];
  const seen = new Set();
  models.forEach(m => {
    m.model.tables.filter(t => !t.is_hidden).forEach(t => { if (!seen.has(t.name)) { seen.add(t.name); tableSel.innerHTML += `<option value="${esc(t.name)}">${esc(t.name)}</option>`; } });
  });
}

function onModelSelect(val) { currentModelIndex = parseInt(val); currentReportFilter = ""; currentPageFilter = ""; currentVisualTypeFilter = ""; currentTableFilter = ""; populateReportSelector(); populatePageSelector(); populateVisualTypeSelector(); populateTableSelector(); rebuildTree(); }
function onReportFilter(val) { currentReportFilter = val; currentPageFilter = ""; populatePageSelector(); rebuildTree(); }
function onPageFilter(val) { currentPageFilter = val; rebuildTree(); }
function onVisualTypeFilter(val) { currentVisualTypeFilter = val; rebuildTree(); }
function onTableFilter(val) { currentTableFilter = val; rebuildTree(); }
function onTreeSearch(val) { currentSearchTerm = val.trim().toLowerCase(); applySearchHighlight(); }

populateModelSelector(); populateReportSelector(); populatePageSelector(); populateVisualTypeSelector(); populateTableSelector();

// ── TREE BUILDING ─────────────────────────────────────────────────
function deepClone(node) {
  if (!node) return { name: "Empty", node_type: "model", metadata: {}, children: [] };
  return { name: node.name, node_type: node.node_type, metadata: {...(node.metadata||{})}, children: (node.children||[]).map(deepClone) };
}

function buildCombinedTree() {
  const models = currentModelIndex === -1 ? MODELS : [MODELS[currentModelIndex]];
  if (models.length === 1) { let tree = deepClone(models[0].lineage_tree); tree = filterTree(tree); return tree; }
  const root = { name: "Workspace", node_type: "workspace", metadata: { model_count: models.length },
    children: models.map(m => { let tree = deepClone(m.lineage_tree); tree = filterTree(tree); return tree; }).filter(t => t && ((t.children && t.children.length > 0) || (!currentReportFilter && !currentTableFilter)))
  };
  return root;
}

function filterTree(node) {
  if (!node) return null;
  const hasFilters = currentReportFilter || currentPageFilter || currentVisualTypeFilter || currentTableFilter;
  if (!hasFilters) return node;

  if (node.node_type === "model" || node.node_type === "workspace") {
    node.children = (node.children || []).map(child => filterTree(child)).filter(c => c !== null);
    return node;
  }
  if (node.node_type === "table") {
    if (currentTableFilter && node.name !== currentTableFilter) return null;
    node.children = (node.children || []).filter(child => {
      if (child.node_type !== "report") return true;
      if (currentReportFilter && child.metadata?.id !== currentReportFilter) return false;
      if (currentPageFilter || currentVisualTypeFilter) {
        child.children = (child.children || []).filter(pg => {
          if (currentPageFilter) { const key = child.metadata?.id + "/" + pg.metadata?.name; if (key !== currentPageFilter) return false; }
          if (currentVisualTypeFilter) {
            pg.children = (pg.children || []).filter(v => v.node_type !== "visual" || v.name === currentVisualTypeFilter);
            return pg.children.length > 0;
          }
          return true;
        });
        return child.children.length > 0;
      }
      return true;
    });
    return (node.children.length > 0 || !currentReportFilter) ? node : null;
  }
  return node;
}

// ── TREE RENDERING ────────────────────────────────────────────────
let treeData;
const container = document.getElementById("tree-panel");
const W = Math.max(container.clientWidth || 1200, 800);
const H = Math.max(window.innerHeight - 240, 500);

const svg = d3.select("#tree-panel").append("svg").attr("width", W).attr("height", H);
const g = svg.append("g");
const linksG = g.append("g");
const nodesG = g.append("g");

const zoom = d3.zoom().scaleExtent([0.1, 4]).on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);
svg.call(zoom.transform, d3.zoomIdentity.translate(140, 40).scale(0.85));

function rebuildTree() { treeData = buildCombinedTree(); renderTree(); applySearchHighlight(); }

function renderTree() {
  const root = d3.hierarchy(treeData, d => d.children);
  treeRoot = root;
  const leafCount = root.leaves().length;
  const dynH = Math.max(H - 80, leafCount * 26);
  d3.tree().size([dynH, W - 340]).separation((a,b) => a.parent === b.parent ? 1 : 1.3)(root);

  const linkData = root.links();
  linksG.selectAll("path.link").data(linkData, d => id(d.source) + "→" + id(d.target))
    .join(
      enter => enter.append("path").attr("class","link").attr("d", linkGen).attr("stroke-opacity",0).transition().duration(300).attr("stroke-opacity",.5),
      update => update.transition().duration(300).attr("d", linkGen),
      exit => exit.transition().duration(150).attr("stroke-opacity",0).remove()
    );

  const nodeData = root.descendants();
  const nodeG = nodesG.selectAll("g.node").data(nodeData, d => id(d));
  nodeG.exit().transition().duration(150).style("opacity",0).remove();

  const enter = nodeG.enter().append("g").attr("class","node")
    .attr("transform", d => `translate(${d.y},${d.x})`).style("cursor","pointer").style("opacity",0);

  enter.append("circle")
    .attr("r", d => SIZES[d.data.node_type] || 6)
    .attr("fill", d => NODE_COLORS[d.data.node_type] || "#999")
    .attr("stroke", d => d.data._children ? NODE_COLORS[d.data.node_type] : "#fff")
    .attr("stroke-width", d => d.data._children ? 3 : 2)
    .attr("filter", "drop-shadow(0 1px 2px rgba(0,0,0,0.15))");

  enter.filter(d => (d.data.children && d.data.children.length) || d.data._children)
    .append("text").attr("class","toggle").attr("dy",".35em").attr("text-anchor","middle")
    .attr("fill","#fff").attr("font-size","10px").attr("font-weight","700")
    .text(d => d.data._children ? "+" : "\u2212");

  enter.append("text").attr("class","label").attr("dy",".35em")
    .attr("x", d => (d.children || d.data._children) ? -14 : 14)
    .attr("text-anchor", d => (d.children || d.data._children) ? "end" : "start")
    .attr("fill","#333").attr("font-size", currentFontSize + "px")
    .text(d => truncate(d.data.name, currentFontSize <= 10 ? 40 : 30));

  enter.filter(d => d.data.node_type === "visual" && d.data.metadata?.title)
    .append("text").attr("dy","1.6em").attr("x",14).attr("text-anchor","start")
    .attr("fill","#888").attr("font-size", (currentFontSize-2)+"px").attr("font-style","italic")
    .text(d => truncate(String(d.data.metadata.title||""), 35));

  enter.filter(d => d.data.node_type === "column" || d.data.node_type === "measure")
    .append("text").attr("dy",".35em").attr("x", d => 14 + d.data.name.length * 6.5 + 6)
    .attr("fill", d => NODE_COLORS[d.data.node_type]).attr("font-size","9px").attr("font-weight","600")
    .text(d => d.data.node_type === "measure" ? "M" : "C");

  enter.transition().duration(300).style("opacity",1);

  const merged = enter.merge(nodeG);
  merged.transition().duration(300).attr("transform", d => `translate(${d.y},${d.x})`).style("opacity",1);
  merged.select("circle").attr("stroke", d => d.data._children ? NODE_COLORS[d.data.node_type] : "#fff")
    .attr("stroke-width", d => d.data._children ? 3 : 2);
  merged.select(".toggle").text(d => d.data._children ? "+" : (d.data.children?.length ? "\u2212" : ""));

  merged.on("click", (_, d) => {
    const nd = d.data;
    if (nd._children) { nd.children = nd._children; nd._children = undefined; }
    else if (nd.children?.length) { nd._children = nd.children; nd.children = undefined; }
    renderTree(); applySearchHighlight();
  }).on("dblclick", (event, d) => {
    event.stopPropagation();
    const nd = d.data;
    if (nd.node_type === "column" || nd.node_type === "measure") {
      // Find parent table name by traversing up
      let tableName = "";
      let modelName = MODELS[0]?.model?.name || "";
      let p = d.parent;
      while (p) {
        if (p.data.node_type === "table") { tableName = p.data.name; }
        if (p.data.node_type === "model") { modelName = p.data.name; }
        p = p.parent;
      }
      simulateFromNode(nd.name, nd.node_type, tableName, modelName);
    }
  });
}

// ── SEARCH HIGHLIGHT ──────────────────────────────────────────────
function applySearchHighlight() {
  const allNodes = nodesG.selectAll("g.node");
  if (!currentSearchTerm) { allNodes.classed("highlight", false).classed("dim", false); return; }
  allNodes.each(function(d) {
    const name = (d.data.name || "").toLowerCase();
    const title = (d.data.metadata?.title || "").toLowerCase();
    const match = name.includes(currentSearchTerm) || title.includes(currentSearchTerm);
    d3.select(this).classed("highlight", match).classed("dim", !match);
  });
}

let relGraphBuilt = false;
function buildRelGraph() {
  if (relGraphBuilt) return;
  relGraphBuilt = true;
  const panel = document.getElementById("rel-panel");

  // Model selector for relationships — only show models with relationships first
  const modelsWithRels = MODELS.map((m, i) => ({ m, i })).sort((a, b) => b.m.model.relationships.length - a.m.model.relationships.length);
  let html = `<div style="margin-bottom:12px;display:flex;gap:10px;align-items:center">
    <label style="font-weight:600;font-size:13px">Model:</label>
    <select id="relModelSel" onchange="renderRelGraph(+this.value)" style="padding:4px 8px;border:1px solid #d0d0d0;border-radius:4px;font-size:13px">`;
  modelsWithRels.forEach(({ m, i }) => { html += `<option value="${i}">${esc(m.model.name)} (${m.model.relationships.length} rels)</option>`; });
  html += `</select><span id="relStats" style="font-size:12px;color:#666"></span>
    <button class="btn-export" onclick="exportRelationshipsCSV()" style="margin-left:auto">&#x1F4E5; Export Relationships CSV</button>
  </div>`;
  html += `<svg id="rel-svg"></svg>`;
  panel.innerHTML = html;
  // Render first model that has relationships
  const firstWithRels = modelsWithRels.find(x => x.m.model.relationships.length > 0);
  renderRelGraph(firstWithRels ? firstWithRels.i : 0);
}

function renderRelGraph(modelIdx) {
  const m = MODELS[modelIdx].model;
  const rels = m.relationships;
  const tables = m.tables.filter(t => !t.is_hidden);

  document.getElementById("relStats").textContent = `${tables.length} tables, ${rels.length} relationships`;

  const svgEl = document.getElementById("rel-svg");
  d3.select("#rel-svg").selectAll("*").remove();

  // If no relationships, show friendly message
  if (!rels || rels.length === 0) {
    const width = svgEl.clientWidth || 900;
    const height = svgEl.clientHeight || 500;
    d3.select("#rel-svg").attr("viewBox", [0, 0, width, height])
      .append("text").attr("x", width/2).attr("y", height/2)
      .attr("text-anchor","middle").attr("font-size","16px").attr("fill","#888")
      .text("No relationships found for this model. Try a different model from the dropdown.");
    return;
  }

  // Normalize cardinality values (DAX returns numeric: 0=Many, 1=One, 2=None)
  const cardMap = {'0':'Many','1':'One','2':'None','many':'Many','one':'One','none':'None','Many':'Many','One':'One'};
  rels.forEach(r => {
    r.from_cardinality = cardMap[String(r.from_cardinality)] || r.from_cardinality || '?';
    r.to_cardinality = cardMap[String(r.to_cardinality)] || r.to_cardinality || '?';
  });

  // Only include tables that participate in at least one relationship
  const participatingTables = new Set();
  rels.forEach(r => { participatingTables.add(r.from_table); participatingTables.add(r.to_table); });

  const nodes = [...participatingTables].map(name => {
    const tbl = tables.find(t => t.name === name);
    return { id: name, columns: tbl ? tbl.columns.length : 0, measures: tbl ? tbl.measures.length : 0 };
  });
  const links = rels.map(r => ({
    source: r.from_table, target: r.to_table,
    fromCol: r.from_column, toCol: r.to_column,
    cardinality: `${r.from_cardinality}:${r.to_cardinality}`,
    label: `${r.from_column} → ${r.to_column}`,
    isActive: r.is_active !== false
  }));

  const width = svgEl.clientWidth || 900;
  const height = svgEl.clientHeight || 500;

  const rSvg = d3.select("#rel-svg").attr("viewBox", [0, 0, width, height]);

  // Zoom support
  const gContainer = rSvg.append("g");
  rSvg.call(d3.zoom().scaleExtent([0.2, 4]).on("zoom", e => gContainer.attr("transform", e.transform)));

  // Arrow marker
  rSvg.append("defs").append("marker").attr("id","arrowhead").attr("viewBox","0 -5 10 10")
    .attr("refX",30).attr("refY",0).attr("markerWidth",6).attr("markerHeight",6).attr("orient","auto")
    .append("path").attr("d","M0,-5L10,0L0,5").attr("fill","#666");

  // Adjust force params based on node count
  const nodeCount = nodes.length;
  const chargeStrength = nodeCount > 30 ? -200 : nodeCount > 15 ? -350 : -500;
  const linkDist = nodeCount > 30 ? 120 : nodeCount > 15 ? 160 : 200;

  const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(linkDist))
    .force("charge", d3.forceManyBody().strength(chargeStrength))
    .force("center", d3.forceCenter(width/2, height/2))
    .force("collision", d3.forceCollide(55))
    .force("x", d3.forceX(width/2).strength(0.05))
    .force("y", d3.forceY(height/2).strength(0.05));

  const link = gContainer.append("g").selectAll("line").data(links).join("line")
    .attr("class", d => "rel-link" + (d.isActive ? "" : " inactive"))
    .attr("stroke-width", 2);

  const linkLabel = gContainer.append("g").selectAll("text").data(links).join("text")
    .attr("class","rel-label").attr("text-anchor","middle")
    .text(d => `${d.label} [${d.cardinality}]`);

  const node = gContainer.append("g").selectAll("g").data(nodes).join("g").attr("class","rel-node")
    .call(d3.drag().on("start", dragStart).on("drag", dragging).on("end", dragEnd));

  // Dynamic rect width based on name length
  node.append("rect")
    .attr("width", d => Math.max(80, d.id.length * 7.5 + 20))
    .attr("height", 36)
    .attr("x", d => -Math.max(80, d.id.length * 7.5 + 20)/2)
    .attr("y", -18)
    .attr("rx", 6).attr("fill","#00b7c3").attr("stroke","#008a94").attr("stroke-width",1.5)
    .attr("filter","drop-shadow(0 2px 4px rgba(0,0,0,0.15))");

  node.append("text").attr("dy","-2").attr("text-anchor","middle").attr("fill","#fff")
    .text(d => d.id.length > 18 ? d.id.slice(0,16)+"..." : d.id);
  node.append("text").attr("dy","12").attr("text-anchor","middle").attr("fill","#e0f7fa").attr("font-size","9px")
    .text(d => `${d.columns}C ${d.measures}M`);

  // Tooltip on hover
  node.append("title").text(d => `${d.id}\n${d.columns} columns, ${d.measures} measures`);

  simulation.on("tick", () => {
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    linkLabel.attr("x",d=>(d.source.x+d.target.x)/2).attr("y",d=>(d.source.y+d.target.y)/2 - 10);
    node.attr("transform",d=>`translate(${d.x},${d.y})`);
  });

  function dragStart(event,d) { if(!event.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
  function dragging(event,d) { d.fx=event.x; d.fy=event.y; }
  function dragEnd(event,d) { if(!event.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }
}

// ── WHAT-IF DELETION SIMULATOR ────────────────────────────────────
// Builds a dependency graph: column → measures that reference it → visuals that use it
function buildDependencyIndex() {
  const idx = { fields: [], measures: [], visuals: [] };
  MODELS.forEach(mData => {
    const modelName = mData.model.name;
    // Index all columns and measures (include hidden tables for measures)
    mData.model.tables.forEach(tbl => {
      if (!tbl.is_hidden) {
        tbl.columns.filter(c => !c.is_hidden).forEach(c => {
          idx.fields.push({ model: modelName, table: tbl.name, name: c.name, type: "column" });
        });
      }
      tbl.measures.forEach(ms => {
        idx.fields.push({ model: modelName, table: tbl.name, name: ms.name, type: "measure", expression: ms.expression });
        idx.measures.push({ model: modelName, table: tbl.name, name: ms.name, expression: ms.expression || "" });
      });
    });
    // Index all visual field bindings
    (mData.reports||[]).forEach(r => {
      (r.pages||[]).forEach(pg => {
        (pg.visuals||[]).forEach(v => {
          (v.field_bindings||[]).forEach(fb => {
            idx.visuals.push({ model: modelName, table: fb.table_name, field: fb.field_name, fieldType: fb.field_type,
              report: r.name, page: pg.display_name, visual: v.title || v.visual_type, vtype: v.visual_type });
          });
        });
      });
    });
  });
  return idx;
}

function findDependentMeasures(fieldName, tableName, modelName, allMeasures) {
  // Find measures whose DAX expression references this field
  const deps = [];
  const searchTerms = [
    fieldName,
    `[${fieldName}]`,
    `${tableName}[${fieldName}]`
  ];
  allMeasures.forEach(ms => {
    if (ms.model !== modelName) return;
    if (ms.name === fieldName && ms.table === tableName) return; // skip self
    const expr = (ms.expression || "").toLowerCase();
    const matches = searchTerms.some(term => expr.includes(term.toLowerCase()));
    if (matches) deps.push(ms);
  });
  return deps;
}

function findAffectedVisuals(fieldName, tableName, fieldType, modelName, allVisuals) {
  // Match by name + table + model; also match by name alone for measures (they are globally unique in a model)
  return allVisuals.filter(v => {
    if (v.model !== modelName) return false;
    if (v.field === fieldName && v.table === tableName) return true;
    // Measures are unique per model — match by name regardless of table (parser may record different table)
    if (fieldType === "measure" && v.field === fieldName) return true;
    return false;
  });
}

function simulateDeletion(fieldName, tableName, fieldType, modelName) {
  const idx = buildDependencyIndex();

  // 1. Direct visual impacts
  const directVisuals = findAffectedVisuals(fieldName, tableName, fieldType, modelName, idx.visuals);

  // 2. Dependent measures (measures that reference this field in DAX)
  const depMeasures = findDependentMeasures(fieldName, tableName, modelName, idx.measures);

  // 3. Visuals affected by dependent measures (cascading)
  const cascadeVisuals = [];
  depMeasures.forEach(ms => {
    const affected = findAffectedVisuals(ms.name, ms.table, "measure", modelName, idx.visuals);
    cascadeVisuals.push({ measure: ms, visuals: affected });
  });

  // 4. Measures depending on dependent measures (2nd-level cascade)
  const level2Measures = [];
  depMeasures.forEach(ms => {
    const l2 = findDependentMeasures(ms.name, ms.table, modelName, idx.measures);
    l2.forEach(m2 => {
      if (!depMeasures.find(dm => dm.name === m2.name && dm.table === m2.table)) {
        const affected = findAffectedVisuals(m2.name, m2.table, "measure", modelName, idx.visuals);
        level2Measures.push({ measure: m2, visuals: affected });
      }
    });
  });

  // Count total broken items
  const uniqueVisuals = new Set();
  directVisuals.forEach(v => uniqueVisuals.add(`${v.report}|${v.page}|${v.visual}`));
  cascadeVisuals.forEach(cv => cv.visuals.forEach(v => uniqueVisuals.add(`${v.report}|${v.page}|${v.visual}`)));
  level2Measures.forEach(l2 => l2.visuals.forEach(v => uniqueVisuals.add(`${v.report}|${v.page}|${v.visual}`)));

  return { fieldName, tableName, fieldType, modelName, directVisuals, depMeasures, cascadeVisuals, level2Measures, totalBroken: uniqueVisuals.size };
}

function renderWhatIfResult(result) {
  const { fieldName, tableName, fieldType, modelName, directVisuals, depMeasures, cascadeVisuals, level2Measures, totalBroken } = result;

  let html = `<div style="background:#fde7e7;padding:10px 14px;border-radius:6px;margin-bottom:14px">
    <strong style="color:#d13438;font-size:15px">&#x274C; Deleting <code>${esc(tableName)}[${esc(fieldName)}]</code> (${fieldType}) from "${esc(modelName)}"</strong><br>
    <span style="font-size:13px">Would break <strong style="color:#d13438">${totalBroken}</strong> visual(s) and <strong style="color:#e3008c">${depMeasures.length + level2Measures.length}</strong> measure(s)</span>
  </div>`;

  if (directVisuals.length > 0) {
    html += `<div style="margin-bottom:12px"><strong class="broken">&#x1F534; Direct Visual Impacts (${directVisuals.length}):</strong>
    <div class="whatif-indent">`;
    directVisuals.forEach(v => {
      html += `<div><span class="dep-report">&#x1F4C4; ${esc(v.report)}</span> &rarr; ${esc(v.page)} &rarr; <span class="dep-visual">${esc(v.visual)}</span> <span style="color:#999;font-size:11px">[${esc(v.vtype)}]</span></div>`;
    });
    html += `</div></div>`;
  }

  if (depMeasures.length > 0) {
    html += `<div style="margin-bottom:12px"><strong class="broken">&#x1F7E0; Dependent Measures That Would Break (${depMeasures.length}):</strong>
    <div class="whatif-indent">`;
    depMeasures.forEach((ms, i) => {
      const cv = cascadeVisuals[i];
      html += `<div><span class="dep-measure">&#x1F4D0; [${esc(ms.name)}]</span> in ${esc(ms.table)} <span style="color:#999;font-size:11px">— references [${esc(fieldName)}]</span>`;
      if (cv && cv.visuals.length > 0) {
        html += `<div class="whatif-indent" style="margin-top:4px">`;
        cv.visuals.forEach(v => {
          html += `<div style="font-size:12px"><span class="dep-report">${esc(v.report)}</span> &rarr; <span class="dep-visual">${esc(v.visual)}</span></div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  if (level2Measures.length > 0) {
    html += `<div style="margin-bottom:12px"><strong class="broken">&#x1F7E1; 2nd-Level Cascade (measures depending on broken measures):</strong>
    <div class="whatif-indent">`;
    level2Measures.forEach(l2 => {
      html += `<div><span class="dep-measure">&#x1F4D0; [${esc(l2.measure.name)}]</span> in ${esc(l2.measure.table)}`;
      if (l2.visuals.length > 0) {
        html += ` &rarr; affects ${l2.visuals.length} visual(s)`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  if (totalBroken === 0 && depMeasures.length === 0) {
    html += `<div style="background:#e8f5e9;padding:10px;border-radius:6px;color:#2e7d32;font-weight:600">
      &#x2705; Safe to delete — no visuals or measures reference this field.
    </div>`;
  }

  return html;
}

function openWhatIfPicker() {
  // Build a field picker
  const idx = buildDependencyIndex();
  let html = `<div style="margin-bottom:12px;font-size:13px;color:#555">Select a field to simulate deletion. Click any column or measure to see what would break.</div>`;
  html += `<div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
    <select id="whatifModel" onchange="updateWhatIfTables()" style="padding:5px 8px;border:1px solid #d0d0d0;border-radius:4px;font-size:13px">`;
  MODELS.forEach((m, i) => { html += `<option value="${i}">${esc(m.model.name)}</option>`; });
  html += `</select>
    <select id="whatifTable" onchange="updateWhatIfFields()" style="padding:5px 8px;border:1px solid #d0d0d0;border-radius:4px;font-size:13px"></select>
    <select id="whatifField" style="padding:5px 8px;border:1px solid #d0d0d0;border-radius:4px;font-size:13px;min-width:200px"></select>
    <button class="btn-whatif" onclick="runWhatIf()">&#x1F4A5; Simulate</button>
  </div>`;
  html += `<div id="whatif-result"></div>`;

  document.getElementById("whatif-title").textContent = "What-If Deletion Simulator";
  document.getElementById("whatif-body").innerHTML = html;
  document.getElementById("whatif-panel").style.display = "block";
  document.getElementById("whatif-overlay").style.display = "block";
  updateWhatIfTables();
}

function updateWhatIfTables() {
  const mIdx = +document.getElementById("whatifModel").value;
  const tSel = document.getElementById("whatifTable");
  tSel.innerHTML = "";
  // Include ALL tables that have columns or measures (even hidden measure tables)
  MODELS[mIdx].model.tables.filter(t => !t.is_hidden || t.measures.length > 0).forEach(t => {
    const label = t.is_hidden ? `${t.name} (hidden)` : t.name;
    tSel.innerHTML += `<option value="${esc(t.name)}">${esc(label)} — ${t.columns.length}C ${t.measures.length}M</option>`;
  });
  updateWhatIfFields();
}

function updateWhatIfFields() {
  const mIdx = +document.getElementById("whatifModel").value;
  const tName = document.getElementById("whatifTable").value;
  const fSel = document.getElementById("whatifField");
  fSel.innerHTML = "";
  const tbl = MODELS[mIdx].model.tables.find(t => t.name === tName);
  if (!tbl) return;
  // Show columns first
  tbl.columns.filter(c => !c.is_hidden).forEach(c => {
    fSel.innerHTML += `<option value="column|${esc(c.name)}">&#x1F539; ${esc(c.name)} [Column]</option>`;
  });
  // Then measures
  tbl.measures.forEach(ms => {
    fSel.innerHTML += `<option value="measure|${esc(ms.name)}">&#x1F538; ${esc(ms.name)} [Measure]</option>`;
  });
  // Also collect measures from ALL tables for this model (in case measures table is separate)
  if (tbl.measures.length === 0) {
    const allMeasures = [];
    MODELS[mIdx].model.tables.forEach(t => {
      t.measures.forEach(ms => { allMeasures.push({...ms, _fromTable: t.name}); });
    });
    if (allMeasures.length > 0 && fSel.options.length > 0) {
      fSel.innerHTML += `<option disabled>── All Model Measures ──</option>`;
      allMeasures.forEach(ms => {
        fSel.innerHTML += `<option value="measure|${esc(ms.name)}">&#x1F538; ${esc(ms._fromTable)}.${esc(ms.name)} [Measure]</option>`;
      });
    }
  }
}

function runWhatIf() {
  const mIdx = +document.getElementById("whatifModel").value;
  const tName = document.getElementById("whatifTable").value;
  const fVal = document.getElementById("whatifField").value;
  if (!fVal) return;
  const [fType, fName] = fVal.split("|");
  const modelName = MODELS[mIdx].model.name;
  const result = simulateDeletion(fName, tName, fType, modelName);
  document.getElementById("whatif-result").innerHTML = renderWhatIfResult(result);
}

function closeWhatIf() {
  document.getElementById("whatif-panel").style.display = "none";
  document.getElementById("whatif-overlay").style.display = "none";
}

// Also allow right-click simulation from tree nodes
function simulateFromNode(nodeName, nodeType, parentTableName, modelName) {
  if (nodeType !== "column" && nodeType !== "measure") return;
  const result = simulateDeletion(nodeName, parentTableName || "", nodeType, modelName || MODELS[0].model.name);
  document.getElementById("whatif-title").textContent = `What-If: Delete "${nodeName}"`;
  document.getElementById("whatif-body").innerHTML = renderWhatIfResult(result);
  document.getElementById("whatif-panel").style.display = "block";
  document.getElementById("whatif-overlay").style.display = "block";
}

// ── CSV EXPORT ────────────────────────────────────────────────────
function exportCSV(data, headers, filename) {
  const escCSV = (v) => { const s = String(v||""); return s.includes(",") || s.includes('"') || s.includes("\n") ? `"${s.replace(/"/g,'""')}"` : s; };
  let csv = headers.map(escCSV).join(",") + "\n";
  data.forEach(row => { csv += row.map(escCSV).join(",") + "\n"; });
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function exportImpactCSV() {
  const rows = [];
  MODELS.forEach(mData => {
    const modelName = mData.model.name;
    (mData.reports||[]).forEach(r => {
      (r.pages||[]).forEach(pg => {
        (pg.visuals||[]).forEach(v => {
          (v.field_bindings||[]).forEach(fb => {
            rows.push([modelName, fb.table_name, fb.field_name, fb.field_type, r.name, pg.display_name, v.title||v.visual_type, v.visual_type]);
          });
        });
      });
    });
  });
  exportCSV(rows, ["Model","Table","Field","Type","Report","Page","Visual","Visual Type"], "tompo_impact_analysis.csv");
}

function exportStaleCSV() {
  const rows = [];
  const usedByTableField = new Set();
  const usedByName = new Set();
  MODELS.forEach(mData => {
    (mData.reports||[]).forEach(r => {
      (r.pages||[]).forEach(pg => {
        (pg.visuals||[]).forEach(v => {
          (v.field_bindings||[]).forEach(fb => {
            usedByTableField.add(mData.model.name + "|" + fb.table_name + "|" + fb.field_name);
            usedByName.add(mData.model.name + "|" + fb.field_name);
          });
        });
      });
    });
  });
  MODELS.forEach(mData => {
    mData.model.tables.filter(t => !t.is_hidden).forEach(tbl => {
      tbl.columns.filter(c => !c.is_hidden).forEach(c => {
        const key = mData.model.name + "|" + tbl.name + "|" + c.name;
        if (!usedByTableField.has(key)) rows.push([mData.model.name, tbl.name, c.name, "column"]);
      });
      tbl.measures.forEach(ms => {
        const nameKey = mData.model.name + "|" + ms.name;
        if (!usedByName.has(nameKey)) rows.push([mData.model.name, tbl.name, ms.name, "measure"]);
      });
    });
  });
  exportCSV(rows, ["Model","Table","Field","Type"], "tompo_stale_fields.csv");
}

function exportRelationshipsCSV() {
  const rows = [];
  MODELS.forEach(mData => {
    mData.model.relationships.forEach(r => {
      rows.push([mData.model.name, r.from_table, r.from_column, r.to_table, r.to_column, r.from_cardinality+":"+r.to_cardinality, r.is_active?"Yes":"No"]);
    });
  });
  exportCSV(rows, ["Model","From Table","From Column","To Table","To Column","Cardinality","Active"], "tompo_relationships.csv");
}
